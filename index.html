<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonfire — Scroll Animation</title>
    <meta name="description" content="A premium, full-screen scroll-driven frame animation of Bonfire.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <!-- Preloader Overlay -->
    <div id="loader" class="loader-overlay">
        <div class="loader-content">
            <div class="loader-logo">BONFIRE</div>
            <div class="loader-track">
                <div id="loader-bar" class="loader-bar"></div>
            </div>
            <div id="loader-text" class="loader-text">Loading Assets (0%)</div>
        </div>
    </div>

    <!-- Pinned Canvas container -->
    <div class="canvas-container">
        <canvas id="animation-canvas"></canvas>
        <div class="gradient-overlay"></div>
    </div>

    <!-- Scroll Spacer to define scroll depth -->
    <div class="scroll-height-spacer"></div>

    <script src="app.js?v=2"></script>
</body>
</html>
